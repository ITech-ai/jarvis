<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Voice Responsive Core - Golden HUD Edition</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #020201; 
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        
        #webgl-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .hud-header {
            position: absolute;
            top: 3%; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 25px;
            align-items: center;
            pointer-events: auto;
        }

        .hud-item {
            color: rgba(250, 223, 57, 0.4); 
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            padding: 5px 12px;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }

        .hud-item::before {
            content: '■';
            font-size: 8px;
            color: transparent;
            transition: all 0.4s ease;
        }

        .hud-item:hover, .hud-item.active {
            color: #fadf39; 
            text-shadow: 0 0 10px rgba(250, 223, 57, 0.8), 0 0 20px rgba(250, 223, 57, 0.4);
        }

        .hud-item:hover::before, .hud-item.active::before {
            color: #fadf39;
            text-shadow: 0 0 8px #fadf39;
        }

        .hud-line {
            position: absolute;
            top: calc(3% + 35px);
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(250, 223, 57, 0.3), rgba(250, 223, 57, 0.3), transparent);
            z-index: 10;
            pointer-events: none;
        }

        .chat-overlay {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 650px;
            height: 60vh;
            background: linear-gradient(135deg, rgba(25, 22, 5, 0.2) 0%, rgba(10, 8, 2, 0.5) 100%);
            border: 1px solid rgba(250, 223, 57, 0.2);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(250, 223, 57, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chat-overlay.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(250, 223, 57, 0.15);
            display: flex;
            align-items: center;
            background: rgba(15, 12, 3, 0.4);
            color: #fadf39;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(250, 223, 57, 0.2);
            border-radius: 4px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.4;
            animation: msgFadeIn 0.3s ease-out forwards;
        }

        .message.jarvis {
            align-self: flex-start;
            background: rgba(250, 223, 57, 0.03);
            border: 1px solid rgba(250, 223, 57, 0.15);
            color: #fffae0;
            border-top-left-radius: 0;
        }
        .message.jarvis::before {
            content: "JARVIS //";
            display: block;
            font-size: 9px;
            color: #fadf39;
            margin-bottom: 4px;
        }

        .message.user {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-top-right-radius: 0;
        }
        .message.user::before {
            content: "USER //";
            display: block;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
            text-align: right;
        }

        .typing-cursor {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: #fadf39;
            margin-left: 2px;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }

        @keyframes msgFadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="hud-header">
        <div class="hud-item active" onclick="selectTab(this, 'core')">Core</div>
        <div class="hud-item" onclick="selectTab(this, 'chat')">Chat</div>
        <div class="hud-item" onclick="selectTab(this, 'dashboard')">Dashboard</div>
    </div>
    <div class="hud-line"></div>

    <div id="webgl-container"></div>

    <div class="chat-overlay" id="chatOverlay">
        <div class="chat-header">// INTERACTIVE VOICE PROTOCOL TERMINAL</div>
        <div class="chat-messages" id="chatBox">
            <div class="message jarvis">Secure connection established. Monitoring voice stream, sir.</div>
        </div>
    </div>

    <script>
        const chatOverlay = document.getElementById('chatOverlay');
        const webglContainer = document.getElementById('webgl-container');
        const chatBox = document.getElementById('chatBox');

        function selectTab(element, tabName) {
            document.querySelectorAll('.hud-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            if (tabName === 'chat') {
                webglContainer.style.opacity = '0.15';
                webglContainer.style.transform = 'scale(0.85)';
                chatOverlay.classList.add('show');
            } else {
                webglContainer.style.opacity = '1';
                webglContainer.style.transform = 'scale(1)';
                chatOverlay.classList.remove('show');
            }
        }

        window.addUserMessage = function(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            
            if(sender === 'user') {
                msgDiv.innerText = text;
                chatBox.appendChild(msgDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            } else {
                chatBox.appendChild(msgDiv);
                let i = 0;
                const cursor = document.createElement('span');
                cursor.classList.add('typing-cursor');
                msgDiv.appendChild(cursor);

                function typeEffect() {
                    if(i < text.length) {
                        cursor.insertAdjacentText('beforebegin', text.charAt(i));
                        i++;
                        chatBox.scrollTop = chatBox.scrollHeight;
                        setTimeout(typeEffect, 20);
                    } else {
                        cursor.remove();
                    }
                }
                typeEffect();
            }
        };

        let isSpeaking = false; 
        window.setSpeakingState = function(state) { 
            isSpeaking = state; 
        };


        const JARVIS_THEME = {
            wireframeColor: 0xd4af37,    
            vertexColor: 0xffe89e,       
            dustColor: 0xfadf39,         
            laserSpikeColor: 0xc5a028,   
            mainArcColor: new THREE.Color(0.98, 0.85, 0.35),     
            secondaryArcColor: new THREE.Color(1.0, 0.93, 0.6),  
            glowCoreColor: new THREE.Color(0.95, 0.78, 0.2)      
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 14; 
        camera.position.y = -0.5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        renderer.toneMappingExposure = 1.6; 
        webglContainer.appendChild(renderer.domElement);

        const customGlowMaterial = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0.0 }, color: { value: JARVIS_THEME.mainArcColor } },
            vertexShader: `varying vec3 vNormal; void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `varying vec3 vNormal; uniform vec3 color; void main() { float intensity = pow(0.75 - dot(vNormal, vec3(0, 0, 1.0)), 2.5); vec3 finalGlow = mix(color, vec3(1.0, 0.98, 0.9), intensity * 0.3); gl_FragColor = vec4(finalGlow * intensity * 4.0, 1.0); }`,
            blending: THREE.AdditiveBlending, side: THREE.DoubleSide, transparent: true
        });

        const sphereGeo = new THREE.IcosahedronGeometry(3.8, 4); 
        const sphereMat = new THREE.MeshBasicMaterial({ color: JARVIS_THEME.wireframeColor, wireframe: true, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending });
        const coreSphere = new THREE.Mesh(sphereGeo, sphereMat); 
        scene.add(coreSphere);

        const coreVertices = new THREE.Points(sphereGeo, new THREE.PointsMaterial({ color: JARVIS_THEME.vertexColor, size: 0.06, transparent: true, blending: THREE.AdditiveBlending }));
        coreSphere.add(coreVertices);

        const particleCount = 2500; 
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3); 
        const originalPositions = new Float32Array(particleCount * 3); 
        const randomDynamics = new Float32Array(particleCount);
        
        for (let i = 0; i < particleCount; i++) {
            const u = Math.random(); const v = Math.random();
            const theta = u * 2.0 * Math.PI; const phi = Math.acos(2.0 * v - 1.0); const r = 5.1 + Math.random() * 2.8;
            positions[i * 3] = originalPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = originalPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = originalPositions[i * 3 + 2] = r * Math.cos(phi); 
            randomDynamics[i] = r;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleCloud = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: JARVIS_THEME.dustColor, size: 0.05, transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending }));
        scene.add(particleCloud);

        const arcGroup = new THREE.Group(); 
        scene.add(arcGroup);
        const mainArc = new THREE.Mesh(new THREE.TorusGeometry(5.2, 0.10, 8, 100, Math.PI * 1.2), customGlowMaterial);
        mainArc.rotation.x = Math.PI / 3; mainArc.rotation.y = Math.PI / 4; 
        arcGroup.add(mainArc);

        const goldGlowMat = customGlowMaterial.clone(); 
        goldGlowMat.uniforms.color.value = JARVIS_THEME.secondaryArcColor;
        const secondaryArc = new THREE.Mesh(new THREE.TorusGeometry(4.9, 0.04, 6, 80, Math.PI * 0.8), goldGlowMat);
        secondaryArc.rotation.x = -Math.PI / 4; secondaryArc.rotation.y = -Math.PI * 0.6; 
        arcGroup.add(secondaryArc);

        const centerCoreNode = new THREE.Mesh(new THREE.SphereGeometry(0.95, 40, 40), new THREE.ShaderMaterial({
            uniforms: { time: { value: 0.0 }, glowColor: { value: JARVIS_THEME.glowCoreColor } },
            vertexShader: `varying vec3 vNormal; void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `varying vec3 vNormal; uniform vec3 glowColor; void main() { float intensity = dot(vNormal, vec3(0.0, 0.0, 1.0)); vec3 glow = glowColor * (1.0 - intensity); vec3 whiteCore = vec3(1.0, 0.97, 0.92) * pow(intensity, 3.5); gl_FragColor = vec4((glow * 2.0) + (whiteCore * 2.5), 1.0); }`,
            blending: THREE.AdditiveBlending, transparent: true
        }));
        scene.add(centerCoreNode);

        const spikesContainer = new THREE.Group(); 
        scene.add(spikesContainer);
        for(let i = 0; i < 4; i++) {
            const spikeGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 3.8, 0), new THREE.Vector3(0, 8.2, 0)]);
            const lineSpike = new THREE.Line(spikeGeo, new THREE.LineBasicMaterial({ color: JARVIS_THEME.laserSpikeColor }));
            lineSpike.rotation.z = (i * Math.PI) / 2; 
            spikesContainer.add(lineSpike);
        }

        const clock = new THREE.Clock();
        let rotCoreY = 0, rotCoreX = 0, rotParticles = 0, rotMainArc = 0, rotSecArc = 0, rotSpikes = 0;
        let currentScale = 1.0, currentOuterScale = 1.0;

        function renderEngine() {
            requestAnimationFrame(renderEngine);
            const delta = clock.getDelta(); const elapsedTime = clock.getElapsedTime(); 
            customGlowMaterial.uniforms.time.value = elapsedTime;
            const speedMultiplier = isSpeaking ? 2.2 : 1.0;

            rotCoreY += delta * 0.10 * speedMultiplier; rotCoreX += delta * 0.05 * speedMultiplier; rotParticles -= delta * 0.03 * speedMultiplier;
            rotMainArc += delta * 0.40 * speedMultiplier; rotSecArc -= delta * 0.55 * speedMultiplier; rotSpikes += delta * 0.07 * speedMultiplier;

            coreSphere.rotation.y = rotCoreY; coreSphere.rotation.x = rotCoreX; particleCloud.rotation.y = rotParticles;
            mainArc.rotation.z = rotMainArc; secondaryArc.rotation.z = rotSecArc; spikesContainer.rotation.z = rotSpikes;

            let targetBaseScale = isSpeaking ? 1.25 : 1.0;
            currentScale += (targetBaseScale - currentScale) * 0.1;
            const dynamicScale = currentScale + Math.sin(elapsedTime * (isSpeaking ? 14.0 : 6.0)) * (isSpeaking ? 0.20 : 0.04);
            centerCoreNode.scale.set(dynamicScale, dynamicScale, dynamicScale);
            
            let targetOuterScale = isSpeaking ? 1.08 : 1.0; 
            currentOuterScale += (targetOuterScale - currentOuterScale) * 0.1;
            coreSphere.scale.set(currentOuterScale, currentOuterScale, currentOuterScale); 
            arcGroup.scale.set(currentOuterScale, currentOuterScale, currentOuterScale);

            const coords = particleCloud.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                let idx = i * 3;
                let wave = 1.0 + Math.sin(elapsedTime * (isSpeaking ? 5.5 : 2.2) + randomDynamics[i] * 1.8) * (isSpeaking ? 0.06 : 0.022);
                coords[idx] = originalPositions[idx] * wave; 
                coords[idx+1] = originalPositions[idx+1] * wave; 
                coords[idx+2] = originalPositions[idx+2] * wave;
            }
            particleCloud.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        renderEngine();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
