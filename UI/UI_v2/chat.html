<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        .chat-overlay {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 650px; height: 60vh;
            background: linear-gradient(135deg, rgba(25, 22, 5, 0.2) 0%, rgba(10, 8, 2, 0.5) 100%);
            border: 1px solid rgba(250, 223, 57, 0.2); border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header { padding: 12px 20px; border-bottom: 1px solid rgba(250, 223, 57, 0.15); background: rgba(15, 12, 3, 0.4); color: #fadf39; font-size: 11px; letter-spacing: 1px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(250, 223, 57, 0.2); border-radius: 4px; }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.4; }
        .message.jarvis { align-self: flex-start; background: rgba(250, 223, 57, 0.03); border: 1px solid rgba(250, 223, 57, 0.15); color: #fffae0; border-top-left-radius: 0; }
        .message.jarvis::before { content: "JARVIS //"; display: block; font-size: 9px; color: #fadf39; margin-bottom: 4px; }
        .message.user { align-self: flex-end; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1); color: #ffffff; border-top-right-radius: 0; }
        .message.user::before { content: "USER //"; display: block; font-size: 9px; color: rgba(255, 255, 255, 0.4); margin-bottom: 4px; text-align: right; }
        .typing-cursor { display: inline-block; width: 6px; height: 12px; background: #fadf39; margin-left: 2px; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="chat-overlay">
        <div class="chat-header">// INTERACTIVE VOICE PROTOCOL TERMINAL</div>
        <div class="chat-messages" id="chatBox">
            <div class="message jarvis">Secure connection established. Monitoring voice stream, sir.</div>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById('chatBox');
        window.addUserMessage = function(text, sender) {
            if (!text || !text.trim() || !chatBox) return;
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            if(sender === 'user') {
                msgDiv.innerText = text; chatBox.appendChild(msgDiv);
            } else {
                chatBox.appendChild(msgDiv); let i = 0;
                const cursor = document.createElement('span'); cursor.classList.add('typing-cursor'); msgDiv.appendChild(cursor);
                function typeEffect() {
                    if(i < text.length) {
                        cursor.insertAdjacentText('beforebegin', text.charAt(i)); i++;
                        chatBox.scrollTop = chatBox.scrollHeight; setTimeout(typeEffect, 15);
                    } else { cursor.remove(); }
                }
                typeEffect();
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        };
    </script>
</body>
</html>
