<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }
        #webgl-container {
            width: 100%;
            height: 100%;
            position: absolute;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="webgl-container"></div>

    <script>
        /* ============================================================
           DARIUSH MAINFRAME OS — Core Visualizer
           WebGL / Three.js r128
           Renders the animated holographic sphere with:
             - Icosahedron wireframe
             - Orbital arc rings
             - Particle dust cloud
             - Laser spikes
             - Central glow node
           Speaking state accelerates all animations.
        ============================================================ */

        /* ── Speaking State ── */
        let isSpeaking = false;
        window.setSpeakingState = function(state) {
            isSpeaking = state;
        };

        /* ============================================================
           THEME PALETTE
           All colors in one place for easy tweaking.
        ============================================================ */
        const THEME = {
            wireframe:      0xd4af37,
            vertex:         0xffe89e,
            dust:           0xfadf39,
            laserSpike:     0xc5a028,
            mainArc:        new THREE.Color(0.98, 0.85, 0.35),
            secondaryArc:   new THREE.Color(1.0,  0.93, 0.60),
            glowCore:       new THREE.Color(0.95, 0.78, 0.20),
        };

        /* ============================================================
           RENDERER SETUP
        ============================================================ */
        const scene    = new THREE.Scene();
        const camera   = new THREE.PerspectiveCamera(
            55,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, -0.5, 14);

        const renderer = new THREE.WebGLRenderer({
            antialias:        true,
            alpha:            true,
            powerPreference:  "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping         = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.6;
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        /* ============================================================
           SHARED GLOW SHADER MATERIAL
           Used for arc rings — additive blending creates the
           bloom / glow effect without a post-processing pass.
        ============================================================ */
        const glowMat = new THREE.ShaderMaterial({
            uniforms: {
                time:  { value: 0.0 },
                color: { value: THEME.mainArc }
            },
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal     = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                uniform vec3  color;
                uniform float time;
                void main() {
                    /* rim glow — brightest at grazing angles */
                    float rim       = pow(0.75 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.5);
                    /* subtle hot-white highlight */
                    vec3  highlight = mix(color, vec3(1.0, 0.98, 0.9), rim * 0.3);
                    /* pulsing intensity driven by time */
                    float pulse     = 1.0 + sin(time * 2.0) * 0.08;
                    gl_FragColor    = vec4(highlight * rim * 4.0 * pulse, 1.0);
                }
            `,
            blending:    THREE.AdditiveBlending,
            side:        THREE.DoubleSide,
            transparent: true,
        });

        /* ============================================================
           CORE SPHERE — Icosahedron Wireframe
        ============================================================ */
        const sphereGeo = new THREE.IcosahedronGeometry(3.8, 4);

        const coreSphere = new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({
            color:       THEME.wireframe,
            wireframe:   true,
            transparent: true,
            opacity:     0.35,
            blending:    THREE.AdditiveBlending,
        }));
        scene.add(coreSphere);

        /* vertex dots sitting on top of the wireframe */
        coreSphere.add(new THREE.Points(sphereGeo, new THREE.PointsMaterial({
            color:       THEME.vertex,
            size:        0.06,
            transparent: true,
            blending:    THREE.AdditiveBlending,
        })));

        /* ============================================================
           INNER CORE SPHERE
           Slightly smaller, counter-rotating — adds depth.
        ============================================================ */
        const innerSphere = new THREE.Mesh(
            new THREE.IcosahedronGeometry(2.4, 2),
            new THREE.MeshBasicMaterial({
                color:       0xc8a800,
                wireframe:   true,
                transparent: true,
                opacity:     0.12,
                blending:    THREE.AdditiveBlending,
            })
        );
        scene.add(innerSphere);

        /* ============================================================
           PARTICLE DUST CLOUD
           Points scattered in a spherical shell — breathe in/out
           via a sine wave displacement each frame.
        ============================================================ */
        const PARTICLE_COUNT = 2800;
        const pGeo           = new THREE.BufferGeometry();
        const pPos           = new Float32Array(PARTICLE_COUNT * 3);
        const pOrigin        = new Float32Array(PARTICLE_COUNT * 3);
        const pPhase         = new Float32Array(PARTICLE_COUNT);  // per-particle phase offset

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const theta = Math.random() * 2.0 * Math.PI;
            const phi   = Math.acos(2.0 * Math.random() - 1.0);
            const r     = 5.1 + Math.random() * 2.8;

            pPos[i*3]   = pOrigin[i*3]   = r * Math.sin(phi) * Math.cos(theta);
            pPos[i*3+1] = pOrigin[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            pPos[i*3+2] = pOrigin[i*3+2] = r * Math.cos(phi);
            pPhase[i]   = Math.random() * Math.PI * 2.0;
        }
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));

        const particleCloud = new THREE.Points(pGeo, new THREE.PointsMaterial({
            color:       THEME.dust,
            size:        0.055,
            transparent: true,
            opacity:     0.85,
            blending:    THREE.AdditiveBlending,
        }));
        scene.add(particleCloud);

        /* ============================================================
           ORBITAL ARC RINGS
        ============================================================ */
        const arcGroup = new THREE.Group();
        scene.add(arcGroup);

        /* — Main arc (large, sweeping) */
        const mainArc = new THREE.Mesh(
            new THREE.TorusGeometry(5.2, 0.10, 8, 120, Math.PI * 1.2),
            glowMat
        );
        mainArc.rotation.x = Math.PI / 3;
        mainArc.rotation.y = Math.PI / 4;
        arcGroup.add(mainArc);

        /* — Secondary arc (tighter, opposite tilt) */
        const secGlowMat = glowMat.clone();
        secGlowMat.uniforms.color.value = THEME.secondaryArc;

        const secondaryArc = new THREE.Mesh(
            new THREE.TorusGeometry(4.9, 0.04, 6, 90, Math.PI * 0.8),
            secGlowMat
        );
        secondaryArc.rotation.x = -Math.PI / 4;
        secondaryArc.rotation.y = -Math.PI * 0.6;
        arcGroup.add(secondaryArc);

        /* — Tertiary thin ring (new) */
        const terGlowMat = glowMat.clone();
        terGlowMat.uniforms.color.value = new THREE.Color(1.0, 0.75, 0.1);

        const tertiaryArc = new THREE.Mesh(
            new THREE.TorusGeometry(4.5, 0.025, 6, 80, Math.PI * 0.5),
            terGlowMat
        );
        tertiaryArc.rotation.x =  Math.PI * 0.6;
        tertiaryArc.rotation.z = -Math.PI * 0.3;
        arcGroup.add(tertiaryArc);

        /* ============================================================
           CENTRAL GLOW NODE
           Custom shader: inner white-hot core + outer colour bloom.
        ============================================================ */
        const centerCore = new THREE.Mesh(
            new THREE.SphereGeometry(0.95, 40, 40),
            new THREE.ShaderMaterial({
                uniforms: {
                    time:      { value: 0.0 },
                    glowColor: { value: THEME.glowCore },
                },
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal     = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3  vNormal;
                    uniform vec3  glowColor;
                    uniform float time;
                    void main() {
                        float facing    = dot(vNormal, vec3(0.0, 0.0, 1.0));
                        vec3  outer     = glowColor * (1.0 - facing);
                        vec3  whiteHot  = vec3(1.0, 0.97, 0.92) * pow(facing, 3.5);
                        /* heartbeat pulse */
                        float heartbeat = 1.0 + sin(time * 3.5) * 0.12 + sin(time * 7.0) * 0.04;
                        gl_FragColor    = vec4((outer * 2.0 + whiteHot * 2.5) * heartbeat, 1.0);
                    }
                `,
                blending:    THREE.AdditiveBlending,
                transparent: true,
            })
        );
        scene.add(centerCore);

        /* ============================================================
           LASER SPIKES
           Four lines radiating outward — rotate continuously.
        ============================================================ */
        const spikesGroup = new THREE.Group();
        scene.add(spikesGroup);

        const spikeMat = new THREE.LineBasicMaterial({ color: THEME.laserSpike });

        for (let i = 0; i < 4; i++) {
            const geo  = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 3.8, 0),
                new THREE.Vector3(0, 8.5, 0),
            ]);
            const line = new THREE.Line(geo, spikeMat);
            line.rotation.z = (i * Math.PI) / 2;
            spikesGroup.add(line);
        }

        /* — Two diagonal spikes (new — makes it look more like a compass rose) */
        for (let i = 0; i < 4; i++) {
            const geo  = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 4.5, 0),
                new THREE.Vector3(0, 6.8, 0),
            ]);
            const line = new THREE.Line(geo, new THREE.LineBasicMaterial({
                color:       THEME.laserSpike,
                transparent: true,
                opacity:     0.4,
            }));
            line.rotation.z = (i * Math.PI) / 2 + Math.PI / 4;
            spikesGroup.add(line);
        }

        /* ============================================================
           EQUATORIAL RING (new)
           A solid torus around the equator — subtle & thin.
        ============================================================ */
        const eqRingMat = glowMat.clone();
        eqRingMat.uniforms.color.value = new THREE.Color(0.85, 0.65, 0.05);

        const equatorialRing = new THREE.Mesh(
            new THREE.TorusGeometry(4.1, 0.018, 6, 160),
            eqRingMat
        );
        /* flat on the XZ plane */
        equatorialRing.rotation.x = Math.PI / 2;
        scene.add(equatorialRing);

        /* ============================================================
           ROTATION ACCUMULATORS
           We accumulate angles manually so speed changes are smooth.
        ============================================================ */
        let rotCoreY   = 0, rotCoreX   = 0;
        let rotInnerY  = 0, rotInnerX  = 0;
        let rotPCloud  = 0;
        let rotMainArc = 0, rotSecArc  = 0, rotTerArc = 0;
        let rotSpikes  = 0;
        let rotEqRing  = 0;

        /* smooth scale lerp targets */
        let scaleCore  = 1.0;
        let scaleOuter = 1.0;

        /* ============================================================
           ANIMATION LOOP
        ============================================================ */
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt      = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            /* ── Time uniforms ── */
            glowMat.uniforms.time.value         = elapsed;
            secGlowMat.uniforms.time.value      = elapsed;
            terGlowMat.uniforms.time.value      = elapsed;
            eqRingMat.uniforms.time.value       = elapsed;
            centerCore.material.uniforms.time.value = elapsed;

            /* ── Speed multiplier ── */
            const spd = isSpeaking ? 2.4 : 1.0;

            /* ── Accumulate rotations ── */
            rotCoreY   += dt * 0.10  * spd;
            rotCoreX   += dt * 0.05  * spd;
            rotInnerY  -= dt * 0.14  * spd;   // counter-rotate inner sphere
            rotInnerX  += dt * 0.08  * spd;
            rotPCloud  -= dt * 0.03  * spd;
            rotMainArc += dt * 0.42  * spd;
            rotSecArc  -= dt * 0.58  * spd;
            rotTerArc  += dt * 0.35  * spd;
            rotSpikes  += dt * 0.08  * spd;
            rotEqRing  += dt * 0.06  * spd;

            /* ── Apply rotations ── */
            coreSphere.rotation.y  = rotCoreY;
            coreSphere.rotation.x  = rotCoreX;
            innerSphere.rotation.y = rotInnerY;
            innerSphere.rotation.x = rotInnerX;
            particleCloud.rotation.y = rotPCloud;
            mainArc.rotation.z       = rotMainArc;
            secondaryArc.rotation.z  = rotSecArc;
            tertiaryArc.rotation.z   = rotTerArc;
            spikesGroup.rotation.z   = rotSpikes;
            equatorialRing.rotation.z = rotEqRing;

            /* ── Central core: heartbeat scale ── */
            const targetCore  = isSpeaking ? 1.28 : 1.0;
            scaleCore        += (targetCore - scaleCore) * 0.10;
            const pulse       = scaleCore +
                Math.sin(elapsed * (isSpeaking ? 14.0 : 5.5)) * (isSpeaking ? 0.22 : 0.04);
            centerCore.scale.setScalar(pulse);

            /* ── Outer sphere / arc scale breathe ── */
            const targetOuter = isSpeaking ? 1.09 : 1.0;
            scaleOuter       += (targetOuter - scaleOuter) * 0.10;
            coreSphere.scale.setScalar(scaleOuter);
            arcGroup.scale.setScalar(scaleOuter);

            /* ── Particle breathing ── */
            const pos = particleCloud.geometry.attributes.position.array;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const idx  = i * 3;
                const wave = 1.0 + Math.sin(
                    elapsed * (isSpeaking ? 5.8 : 2.2) + pPhase[i]
                ) * (isSpeaking ? 0.07 : 0.022);
                pos[idx]   = pOrigin[idx]   * wave;
                pos[idx+1] = pOrigin[idx+1] * wave;
                pos[idx+2] = pOrigin[idx+2] * wave;
            }
            particleCloud.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        animate();

        /* ============================================================
           RESIZE HANDLER
        ============================================================ */
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
