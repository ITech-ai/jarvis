<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS AI - Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #020201;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(250, 223, 57, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(250, 223, 57, 0.015) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }

        .chat-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 750px;
            height: 80vh;
            background: linear-gradient(135deg, rgba(25, 22, 5, 0.3) 0%, rgba(10, 8, 2, 0.6) 100%);
            border: 1px solid rgba(250, 223, 57, 0.2);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(250, 223, 57, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }


        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(250, 223, 57, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 12, 3, 0.4);
        }

        .chat-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fadf39;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(250, 223, 57, 0.6);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #fadf39;
            border-radius: 50%;
            box-shadow: 0 0 8px #fadf39;
            animation: pulse 1.8s infinite ease-in-out;
        }

        .chat-messages {
            flex: 1;
            padding: 25px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(250, 223, 57, 0.2);
            border-radius: 4px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-out forwards;
        }

        .message.jarvis {
            align-self: flex-start;
            background: rgba(250, 223, 57, 0.04);
            border: 1px solid rgba(250, 223, 57, 0.15);
            color: #fffae0;
            border-top-left-radius: 0;
        }
        .message.jarvis::before {
            content: "JARVIS //";
            display: block;
            font-size: 10px;
            color: #fadf39;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .message.user {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-top-right-radius: 0;
        }
        .message.user::before {
            content: "USER //";
            display: block;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-align: right;
        }

        .chat-input-area {
            padding: 15px 20px;
            border-top: 1px solid rgba(250, 223, 57, 0.15);
            background: rgba(5, 4, 1, 0.5);
            display: flex;
            gap: 15px;
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(250, 223, 57, 0.2);
            border-radius: 6px;
            padding: 12px 15px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            border-color: #fadf39;
            box-shadow: 0 0 10px rgba(250, 223, 57, 0.15);
        }

        .send-btn {
            background: rgba(250, 223, 57, 0.1);
            border: 1px solid #fadf39;
            color: #fadf39;
            padding: 0 22px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            background: #fadf39;
            color: #020201;
            box-shadow: 0 0 15px rgba(250, 223, 57, 0.4);
        }

        .typing-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #fadf39;
            margin-left: 3px;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 12px #fadf39; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-status">
                <div class="pulse-dot"></div>
                JARVIS Core v4.0 // Online
            </div>
            <div style="color: rgba(250,223,57,0.3); font-size: 11px;">SECURE LINK</div>
        </div>

        <div class="chat-messages" id="chatBox">
            <div class="message jarvis">At your service, sir. Systems are nominal. What are we analyzing today?</div>
        </div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="userInput" placeholder="Enter command or message..." autocomplete="off">
            <button class="send-btn" id="sendBtn">Execute</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        const jarvisResponses = [
            "I've initiated a diagnostic scan on that request, sir.",
            "Processing vectors... The results match our current system configurations.",
            "Search protocol executed successfully. Displaying telemetry on your main dashboard now.",
            "Understood, sir. Adjusting parameters accordingly."
        ];

        function appendMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            
            if (sender === 'user') {
                messageDiv.innerText = text;
                chatBox.appendChild(messageDiv);
                scrollToBottom();
            } else {
                chatBox.appendChild(messageDiv);
                let i = 0;
                const cursor = document.createElement('span');
                cursor.classList.add('typing-cursor');
                messageDiv.appendChild(cursor);

                function typeWriter() {
                    if (i < text.length) {
                        cursor.insertAdjacentText('beforebegin', text.charAt(i));
                        i++;
                        setTimeout(typeWriter, 30); 
                        scrollToBottom();
                    } else {
                        cursor.remove(); 
                    }
                }
                typeWriter();
            }
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';

            setTimeout(() => {
                const randomReply = jarvisResponses[Math.floor(Math.random() * jarvisResponses.length)];
                appendMessage(randomReply, 'jarvis');
            }, 1000);
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
